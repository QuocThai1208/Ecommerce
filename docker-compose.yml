name: E-Commerce
services:
  kafka:
    image: "bitnamilegacy/kafka:latest"
    container_name: kafka
    hostname: kafka
    restart: always
    ports:
      - '9094:9094'
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
  mysql:
    image: mysql:8.0.36-debian
    container_name: mysql
    hostname: mysql
    restart: always
    ports:
      - '3308:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
  mongodb:
    image: mongo:latest
    container_name: mongodb
    hostname: mongodb
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - '8888:8888'
    environment:
      - DISCOVERY_DEFAULT_ZONE=${DISCOVERY_DEFAULT_ZONE}
    depends_on:
      - discovery-server
  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    restart: always
    ports:
      - '8761:8761'
  identity-service:
    build: ./identity-service
    container_name: identity-service
    restart: always
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=${IDENTITY_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${IDENTITY_DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${IDENTITY_DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - SPRING_JWT_SIGNER_KEY=${JWT_SIGNER_KEY}
      - DISCOVERY_DEFAULT_ZONE=${DISCOVERY_DEFAULT_ZONE}
    depends_on:
      - discovery-server
      - mysql
  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: always
    ports:
      - '8081:8081'
    environment:
      - SPRING_DATASOURCE_URL=${NOTIFICATION_DB_URL}
      - SPRING_BREVO_URL=${EMAIL_BREVO_URL}
      - SPRING_BREVO_API_KEY=${EMAIL_BREVO_API_KEY}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      - DISCOVERY_DEFAULT_ZONE=${DISCOVERY_DEFAULT_ZONE}
    depends_on:
      - discovery-server
      - kafka
      - mongodb